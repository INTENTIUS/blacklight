name = "blacklight"
main = "src/handler.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built SPA from this same Worker (no separate Pages project).
# Static assets are served first; POST /audit (no matching asset) hits the Worker.
# Unmatched GET paths fall back to index.html (single-page app).
[assets]
directory = "./web/dist"
not_found_handling = "single-page-application"

# Server-side git token (lifts rate limits, resolves action SHAs/image digests).
# Set with: wrangler secret put GIT_TOKEN
# [vars] GIT_TOKEN is a secret, not a plain var.

# Anonymous audit counter (KV) — wired in #357 alongside rate limiting.
# [[kv_namespaces]]
# binding = "STATS"
# id = "…"
