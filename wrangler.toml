name = "blacklight"
main = "src/handler.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Served at blacklight.intentius.workers.dev (worker name + the account's
# workers.dev subdomain). A custom domain (blacklight.intentius.io) needs the
# intentius.io zone on Cloudflare — deferred; see issue #1.

# The SPA is served from this same Worker via Static Assets, but only at deploy
# time (`wrangler deploy --assets ./web/dist`) — keeping it out of the base
# config so `wrangler dev` / CI don't require a built web/dist. See README.

# Server-side git token (lifts rate limits, resolves action SHAs/image digests).
# Set with: wrangler secret put GIT_TOKEN
# [vars] GIT_TOKEN is a secret, not a plain var.

# Anonymous audit counter + per-IP/global rate limiting (#357). Bound by config
# so Workers Builds picks it up on deploy — no dashboard step.
[[kv_namespaces]]
binding = "STATS"
id = "a9d537a35aab42b19acd1f22787535a0"
