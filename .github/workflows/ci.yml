name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  WRANGLER_SEND_METRICS: "false"

jobs:
  # Fast gate: worker + SPA typecheck, unit/render tests, edge bundle (mirrors `just check`).
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm --prefix web ci
      - name: typecheck (worker)
        run: npx tsc --noEmit
      - name: typecheck (web)
        run: npm --prefix web run tsc
      - name: unit tests (worker)
        run: npm test
      - name: render tests (web)
        run: npm --prefix web test
      - name: edge bundle
        run: npx wrangler deploy --dry-run --outdir dist

  # Dogfood: audit our own repo with chant — the tool must pass its own checks.
  dogfood-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: audit our own config with chant
        run: npx chant audit . --fail-on merge-worthy

  # Browser E2E: headless Chromium drives the SPA against the worker (fixture mode).
  e2e-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm --prefix web ci
      - run: npm --prefix web exec -- playwright install --with-deps chromium
      - run: npm --prefix web run e2e:browser

  # Clean-room E2E: install Blacklight from npm in a container, boot the worker on
  # workerd, run the full audit pipeline offline. (Docker preinstalled on ubuntu.)
  e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash e2e/run.sh
