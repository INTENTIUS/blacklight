name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Deploy the Worker (serving the SPA via Static Assets) to Cloudflare.
  # Gated on the repo variable DEPLOY=true, so it stays inert until you set that
  # plus the CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets.
  deploy:
    if: ${{ vars.DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Scope the Cloudflare token to a protected environment (set the secrets there).
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm --prefix web ci
      - name: build SPA
        run: npm --prefix web run build
      - name: deploy worker + assets
        run: npx wrangler deploy --assets ./web/dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
